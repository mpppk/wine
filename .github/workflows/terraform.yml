name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

# 同一ブランチへの連続 push では古いコミットの plan run をキャンセルする
# (PR のみ。main への push は全て走らせる)。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  terraform:
    name: Terraform Validate & Plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: preview
            # テストモードの Stripe キーを入れる GitHub Secret 名
            stripe_key_secret: STRIPE_TEST_API_KEY
          - env: production
            stripe_key_secret: STRIPE_LIVE_API_KEY
    defaults:
      run:
        working-directory: terraform/${{ matrix.env }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.13.4"

      - name: Format check
        if: matrix.env == 'preview' # リポジトリ全体に1回で足りる
        run: terraform fmt -check -recursive ..

      # validate は資格情報不要(バックエンドなしで初期化)なので常に実行する
      - name: Validate
        run: |
          terraform init -backend=false -input=false
          terraform validate

      # secrets コンテキストは if 式で参照できないため、env 経由で有無を判定する。
      # plan は PR では実行しない(下記 Plan の理由参照)ため、PR ではこのステップ自体を
      # スキップして Secrets を PR コンテキストに一切露出させない。
      - name: Check credentials
        id: creds
        if: github.event_name != 'pull_request'
        env:
          R2_ACCESS_KEY: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          STRIPE_KEY: ${{ secrets[matrix.stripe_key_secret] }}
        run: |
          if [ -n "$R2_ACCESS_KEY" ] && [ -n "$STRIPE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      # plan は R2(state) と Stripe の資格情報が必要。Secrets 未設定ならスキップする。
      # Stripe への書き込みは行わない(plan は読み取りのみ)。
      #
      # PR では plan を実行しない: terraform plan は PR ブランチの .tf をそのまま実行するため、
      # provider 差し替えや external data source の追加で live Stripe キー / R2(state)認証情報を
      # 持つプロセスで任意コードが動きうる(#134)。plan は push:main と workflow_dispatch に限定し、
      # PR では fmt / validate(資格情報不要)のみ実行する。
      - name: Plan
        if: github.event_name != 'pull_request' && steps.creds.outputs.available == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_R2_SECRET_ACCESS_KEY }}
          STRIPE_API_KEY: ${{ secrets[matrix.stripe_key_secret] }}
        run: |
          terraform init -reconfigure -input=false
          terraform plan -input=false -no-color

      - name: Plan skipped notice (secrets 未設定)
        if: github.event_name != 'pull_request' && steps.creds.outputs.available != 'true'
        run: |
          echo "::notice title=Terraform plan (${{ matrix.env }}) をスキップ::GitHub Secrets (TF_R2_ACCESS_KEY_ID / TF_R2_SECRET_ACCESS_KEY / ${{ matrix.stripe_key_secret }}) が未設定のため validate のみ実行しました。設定方法は terraform/README.md を参照。"

      - name: Plan skipped notice (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "::notice title=Terraform plan (${{ matrix.env }}) をスキップ::PR では live 認証情報を PR ブランチのコードに渡さないため plan を実行しません(fmt / validate のみ)。plan は main へのマージ後(push)または手動実行(workflow_dispatch)で確認します。"

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 最小権限。CI は読み取りのみで足りる(依存の postinstall が書き込みトークンを
# 持たないようにする)。terraform 系ワークフローと同一の指定に揃える。
permissions:
  contents: read

# 同一ブランチへの連続 push では古いコミットの run をキャンセルする
# (PR のみ。main への push は履歴として全て走らせる)。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Type Check, Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3

      # bun のパッケージキャッシュ(setup-bun はバイナリのみキャッシュする)。
      # bun.lock が変わらない限りレジストリからの全取得を避ける。
      - name: Cache bun packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint & Format check (Biome)
        run: bun run check

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # 手書き連番SQLがゼロから適用可能かを検証する。ローカルの miniflare SQLite に
      # 全マイグレーションを適用し、構文エラー・連番の衝突・migrate 忘れを検出する
      # (リモート認証情報は不要)。
      - name: Verify D1 migrations (local)
        run: bun run db:migrate:local

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Type Check, Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint & Format check (Biome)
        run: bun run check

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # 手書き連番SQLがゼロから適用可能かを検証する。ローカルの miniflare SQLite に
      # 全マイグレーションを適用し、構文エラー・連番の衝突・migrate 忘れを検出する
      # (リモート認証情報は不要)。
      - name: Verify D1 migrations (local)
        run: bun run db:migrate:local
